<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Naavik – Opportunity Voice Assistant</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:#cbd5f5;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    border-radius:6px;
    border:none;
    margin-bottom:20px;
    font-size:16px;
}

button{
    background:#38bdf8;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#0ea5e9;
}

.note{
    margin-top:20px;
    font-size:12px;
    color:#94a3b8;
}

.status{
    margin-top:15px;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>Naavik</h1>

<div class="subtitle">
Voice-based assistant for discovering government opportunities
</div>

<input id="phone" placeholder="+91XXXXXXXXXX" />

<button onclick="callUser()">Request a Call</button>

<div class="status" id="status"></div>

<div class="note">
⚠ Twilio trial accounts can only call <b>verified phone numbers</b>.
<br><br>
Make sure your number is verified in the Twilio console.
</div>

</div>

<script>

async function callUser(){

    const phone = document.getElementById("phone").value;
    const status = document.getElementById("status");

    status.innerHTML = "📞 Requesting call...";

    try{

        const response = await fetch(
        "https://rji5or33ohvnmeulwgu4j4tese0afgrc.lambda-url.ap-south-1.on.aws/",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                phone_number: phone
            })
        });

        const data = await response.json();

        status.innerHTML = "✅ Call initiated. Please answer your phone.";

    }
    catch(err){

        status.innerHTML = "❌ Failed to initiate call.";

    }

}

</script>

</body>
</html>
